name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Build-time env vars. Real values come from Vercel preview/prod;
          # CI gets stubs because we never hit Redis or SendGrid during build.
          UPSTASH_REDIS_REST_URL: https://example.upstash.io
          UPSTASH_REDIS_REST_TOKEN: ci-stub-token
          SENDGRID_API_KEY: ci-stub-key
          SENDGRID_FROM_EMAIL: ci@example.com
        run: npm run build
